name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install chromium

      - run: pnpm run ci
